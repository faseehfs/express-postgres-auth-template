<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express - Home</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      async function redirectIfNotLoggedIn() {
        const response = await fetch("/api/user/is-logged-in");
        const data = await response.json();
        if (!data.isLoggedIn) {
          alert("You are not logged in.");
          window.location.href = "/login";
        }
      }

      redirectIfNotLoggedIn();
    </script>
  </head>
  <body>
    <h1>Home</h1>
    <p>You are logged in! You can now do <i>restricted</i> stuff.</p>
    <div class="button-group">
      <a class="button" href="/api/user/details">See Your Details</a>
      <a class="button" href="/api/user/logout">Logout</a>
    </div>
  </body>
</html>
