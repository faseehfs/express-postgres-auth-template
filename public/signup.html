<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <h1>Signup</h1>
    <form id="signupForm">
      <label for="username">Username:</label><br />
      <input type="text" id="username" name="username" /><br />

      <label for="email">Email:</label><br />
      <input type="text" id="email" name="email" /><br />

      <label for="password">Password:</label><br />
      <input type="text" id="password" name="password" /><br />

      <p id="errorP" style="color: red; display: none"></p>

      <button id="signupFormSubmitButton" class="button" type="submit" disabled>
        Submit
      </button>
    </form>

    <script>
      const signupForm = document.getElementById("signupForm");
      const signupBtn = document.getElementById("signupFormSubmitButton");
      const inputs = signupForm.querySelectorAll("input");

      // Disable submit button if inputs are empty
      inputs.forEach((input) => {
        input.addEventListener("input", () => {
          let allFilled = true;

          inputs.forEach((input) => {
            if (input.value.length < 3) {
              allFilled = false;
            }
          });

          signupBtn.disabled = !allFilled;
        });
      });

      // Submit form
      signupForm.addEventListener("submit", async function (event) {
        // Here, if we use an arrow function, we can't access signupForm inside.
        // But we need signupForm to get formData. So we use a regular function.

        event.preventDefault();

        const formData = new FormData(signupForm);

        const payload = {
          username: formData.get("username"),
          email: formData.get("email"),
          password: formData.get("password"),
          // The .get() method looks for the "name" attribute, not the "id".
        };

        const response = await fetch("api/new-user", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (response.ok) {
          window.location = "/login.html";
        } else {
          const data = await response.json();

          const errorP = document.getElementById("errorP");
          errorP.style.display = "block";
          errorP.textContent = data.error;
        }
      });
    </script>
  </body>
</html>
