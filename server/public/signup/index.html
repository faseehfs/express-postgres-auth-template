<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <h1>Signup</h1>
    <form id="signupForm">
      <input
        type="text"
        id="username"
        name="username"
        autocomplete="name"
        placeholder="Username"
      /><br /><br />
      <input
        type="email"
        id="email"
        name="email"
        autocomplete="email"
        placeholder="Email"
      /><br /><br />
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="new-password"
        placeholder="Password"
      /><br /><br />
      <p id="errorP" class="danger-color" style="display: none"></p>
      <button id="signupFormSubmitButton" class="button" type="submit" disabled>
        Submit
      </button>
    </form>

    <script>
      const signupForm = document.getElementById("signupForm");
      const signupBtn = document.getElementById("signupFormSubmitButton");
      const inputs = signupForm.querySelectorAll("input");

      // Disable submit button if inputs are empty
      inputs.forEach((input) => {
        input.addEventListener("input", () => {
          let allFilled = true;

          inputs.forEach((input) => {
            if (input.value.length < 3) {
              allFilled = false;
            }
          });

          signupBtn.disabled = !allFilled;
        });
      });

      // Submit form
      signupForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const formData = new FormData(signupForm);

        const payload = {
          username: formData.get("username"),
          email: formData.get("email"),
          password: formData.get("password"),
          // The .get() method looks for the "name" attribute, not the "id".
        };

        const response = await fetch("/api/user/new", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (response.ok) {
          window.location = "/home";
        } else {
          const data = await response.json();

          const errorP = document.getElementById("errorP");
          errorP.style.display = "block";
          errorP.innerHTML = `Failed to create new account. Try using an alternate email or password.`;
        }
      });
    </script>
  </body>
</html>
